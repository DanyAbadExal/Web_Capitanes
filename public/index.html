<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel C. Control - Producción</title>
    <style>
        /* --- VARIABLES DE DISEÑO OPTIMIZADAS (MÁXIMO ESPACIO GRÁFICO) --- */
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-solid: #2563eb;
            --success-color: #10b981;
            --sidebar-width: 75px; /* Barra lateral compacta tipo dock */
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- PANTALLA DE LOGIN --- */
        .login-container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
        }

        .login-logo {
            color: var(--primary-solid);
            margin-bottom: 15px;
        }

        .login-container h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-container p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-solid);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-solid);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-login:hover { opacity: 0.9; }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        /* --- INTERFAZ DEL DASHBOARD OPTIMIZADA --- */
        .dashboard-layout {
            width: 100%;
            height: 100%;
            display: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-right: 1px solid rgba(255,255,255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .brand-logo-mini {
            color: var(--primary-solid);
            background: rgba(37, 99, 235, 0.1);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-badge-mini {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 50%;
        }

        .status-indicator-mini {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background-color: var(--success-color);
            border: 2px solid var(--bg-card);
            border-radius: 50%;
        }

        .btn-logout-mini {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-logout-mini:hover { 
            background: #ef4444; 
            color: white;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0b0f19; 
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid rgba(255,255,255, 0.05);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* DISEÑO REFORMADO PARA NOMBRE DE PATRÓN + EMBARCACIÓN */
        .user-tag {
            font-size: 0.85rem;
            font-weight: 600;
            color: #38bdf8; /* Azul cyan brillante enfocado en perfil */
            background: rgba(56, 189, 248, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
            margin-right: 15px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            letter-spacing: 0.3px;
        }

        .header-actions {
            display: flex;
            align-items: center;
        }

        .btn-fullscreen {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .report-wrapper {
            flex: 1;
            padding: 10px; 
            display: flex;
        }

        .report-container {
            flex: 1;
            background: #151f32;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container" id="login-box">
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 00-2.25 2.25z" />
            </svg>
        </div>
        <h2>Control de Flota</h2>
        <p>Introduce tus credenciales operativas</p>
        
        <div class="input-group">
            <label for="username">Usuario / DNI</label>
            <input type="text" id="username" placeholder="Ej. 12345678">
        </div>
        
        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="validateLogin()">Ingresar al Sistema</button>
        <div class="error-message" id="error-txt">Usuario o contraseña incorrectos.</div>
    </div>

    <div class="dashboard-layout" id="dashboard-box">
        <nav class="sidebar">
            <div class="brand-logo-mini" title="Reporte C. Control">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v16.5M21 19.5H3.75M6.75 12v3m3.75-6v6m3.75-9v9M18 6.75v11.25" />
                </svg>
            </div>
            <div class="status-badge-mini" title="Conexión de Servidor Activa">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
                </svg>
                <span class="status-indicator-mini"></span>
            </div>
            <button class="btn-logout-mini" onclick="logout()" title="Cerrar Sesión">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M19.5 12l-3-3m3 3l-3 3m3-3H9" />
                </svg>
            </button>
        </nav>
        <main class="main-content">
            <header>
                <h1>Análisis Flota - Centro Control (Patrones Propia)</h1>
                <div class="header-actions">
                    <span class="user-tag" id="user-display">Cargando perfil...</span>
                    <button class="btn-fullscreen" onclick="toggleFullScreen()">Pantalla Completa</button>
                </div>
            </header>
            <div class="report-wrapper">
                <div class="report-container" id="fullscreen-target">
                    <iframe id="powerbi-iframe" title="1. Análisis Flota-Centro Control" src="" allowFullScreen="true"></iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function validateLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const errorTxt = document.getElementById('error-txt');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userIn, password: passIn })
                });
                
                const data = await response.json();

                if (data.success) {
                    errorTxt.style.display = 'none';
                    loadDashboard(); 
                } else {
                    errorTxt.innerText = data.message;
                    errorTxt.style.display = 'block';
                }
            } catch (error) {
                errorTxt.innerText = "Error de conexión con el servidor.";
                errorTxt.style.display = 'block';
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/api/report-config');
                if(!response.ok) throw new Error();
                
                const data = await response.json();
                
                if(data.success) {
                    const iframe = document.getElementById('powerbi-iframe');
                    
                    iframe.src = "about:blank"; 
                    
                    setTimeout(() => {
                        iframe.src = data.iframeUrl; 
                    }, 100);

                    // Mapeo directo del identificador de pantalla sin prefijos estáticos
                    document.getElementById('user-display').innerText = data.username;
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('dashboard-box').style.display = 'flex';
                }
            } catch (err) {
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('dashboard-box').style.display = 'none';
            }
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.reload();
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { validateLogin(); }
        });

        function toggleFullScreen() {
            var target = document.getElementById('fullscreen-target');
            if (!document.fullscreenElement) {
                target.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
